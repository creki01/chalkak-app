<script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const resultContainer = document.getElementById('resultContainer');
        const resultText = document.getElementById('resultText');
        const summaryContainer = document.getElementById('summaryContainer');
        const summaryContent = document.getElementById('summaryContent');
        const loading = document.getElementById('loading');
        const speedSelect = document.getElementById('speedSelect');
        
        let sentences = []; 
        let currentSentenceIndex = 0; 

        // 시스템 음성 목록 미리 불러오기 (일본어 엔진을 확실히 잡기 위함)
        let availableVoices = [];
        window.speechSynthesis.onvoiceschanged = () => {
            availableVoices = window.speechSynthesis.getVoices();
        };

        function isJapaneseText(text) {
            return /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
        }

        // 🗣️ 음성 생성 헬퍼 함수
        function createUtterance(text, isJapanese) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = parseFloat(speedSelect.value);
            utterance.lang = isJapanese ? 'ja-JP' : 'en-US';
            
            // 기기에 설치된 일본어/영어 원어민 목소리를 강제로 매칭
            const voices = window.speechSynthesis.getVoices();
            if (isJapanese) {
                const jaVoice = voices.find(v => v.lang.includes('ja') || v.name.includes('Japanese'));
                if (jaVoice) utterance.voice = jaVoice;
            } else {
                const enVoice = voices.find(v => v.lang.includes('en'));
                if (enVoice) utterance.voice = enVoice;
            }
            return utterance;
        }

        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            stopSpeech();
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                const base64Image = e.target.result.split(',')[1]; 
                sendToVisionAPI(base64Image);
            };
            reader.readAsDataURL(file); 
        });

        async function sendToVisionAPI(base64Image) {
            loading.innerText = '⏳ 사진에서 글자를 읽고 있습니다...';
            loading.style.display = 'block';
            resultContainer.style.display = 'none';
            summaryContainer.style.display = 'none';
            resultText.innerHTML = '';
            sentences = [];

            try {
                const response = await fetch('/api/vision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const text = data.responses[0]?.fullTextAnnotation?.text;
                if (text) {
                    sentences = text.match(/[^.!?。！？\n]+[.!?。！？\n]*/g) || [text];
                    sentences.forEach((sentence, index) => {
                        const span = document.createElement('span');
                        span.className = 'sentence';
                        span.id = 'sentence-' + index;
                        span.innerText = sentence + ' '; 
                        span.onclick = () => { stopSpeech(); playSpeech(index); };
                        resultText.appendChild(span);
                    });
                    
                    generateSummary(text);
                } else {
                    resultText.innerText = '글자를 찾지 못했어요.';
                }
            } catch (error) {
                resultText.innerText = '오류: ' + error.message;
            } finally {
                loading.style.display = 'none';
                resultContainer.style.display = 'block';
            }
        }

        async function generateSummary(text) {
            summaryContainer.style.display = 'block';
            summaryContent.innerHTML = '⏳ AI가 수준별 요약본을 만들고 있습니다...';

            try {
                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || '요약본 생성 실패');
                
                summaryContent.innerHTML = '';
                const levels = [
                    { key: 'beginner', title: '🌱 초급 (Beginner)' },
                    { key: 'intermediate', title: '🌿 중급 (Intermediate)' },
                    { key: 'advanced', title: '🌳 고급 (Advanced)' }
                ];
                
                levels.forEach(lvl => {
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${lvl.title}</strong><br>`;
                    
                    const span = document.createElement('span');
                    span.className = 'sentence';
                    
                    const summaryData = data[lvl.key] || {};
                    
                    // 화면에 보여줄 텍스트 조립 (원문 -> 번역 -> 발음표기 순서대로 각각 줄바꿈)
                    let displayText = summaryData.text || '';
                    if (summaryData.translation) displayText += `\n${summaryData.translation}`;
                    if (summaryData.pronunciation) displayText += `\n${summaryData.pronunciation}`;
                    
                    span.innerText = displayText;
                    span.dataset.speakText = summaryData.text || ''; 
                    
                    span.onclick = function() {
                        stopSpeech();
                        if (!this.dataset.speakText) return;

                        const isJa = isJapaneseText(this.dataset.speakText);
                        const utterance = createUtterance(this.dataset.speakText, isJa);
                        
                        this.classList.add('highlight');
                        utterance.onend = () => this.classList.remove('highlight');
                        window.speechSynthesis.speak(utterance);
                    };
                    
                    p.appendChild(span);
                    summaryContent.appendChild(p);
                });
            } catch (error) {
                summaryContent.innerHTML = `<p style="color:#d32f2f; font-weight:bold;">🚨 에러: ${error.message}</p>`;
            }
        }

        function playSpeech(startIndex = 0) {
            if (sentences.length === 0) return;
            if (!window.speechSynthesis) return;

            stopSpeech(); 
            currentSentenceIndex = startIndex;
            speakNextSentence();
        }

        function speakNextSentence() {
            if (currentSentenceIndex >= sentences.length) {
                clearHighlights();
                return;
            }

            clearHighlights(); 
            const targetSpan = document.getElementById('sentence-' + currentSentenceIndex);
            if (targetSpan) {
                targetSpan.classList.add('highlight');
                targetSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const textToSpeak = sentences[currentSentenceIndex];
            const isJa = isJapaneseText(textToSpeak);
            const utterance = createUtterance(textToSpeak, isJa);
            
            utterance.onend = function() {
                currentSentenceIndex++;
                speakNextSentence();
            };

            window.speechSynthesis.speak(utterance);
        }

        function stopSpeech() {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                clearHighlights();
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.sentence').forEach(span => {
                span.classList.remove('highlight');
            });
        }
    </script>
